<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — Gala Parfume</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div data-nav></div>

<div class="auth-shell">
  <div class="auth-card">
    <div class="ico">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M20 8v6M23 11h-6"/></svg>
    </div>
    <h1>Create Account</h1>
    <div id="regAlert"></div>
    <form id="regForm">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="rName" required placeholder="Your full name">
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="rEmail" required placeholder="Enter your email">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="rPassword" required minlength="6" placeholder="At least 6 characters">
      </div>
      <button type="submit" class="btn btn-gold btn-block">Create Account</button>
    </form>
    <div class="auth-divider">or</div>
    <div class="auth-switch">Already have an account? <a href="login.html">Sign In</a></div>
    <a href="index.html" class="back-home">&larr; Back to Home</a>
  </div>
</div>

<script src="js/store.js"></script>
<script src="js/ui.js"></script>
<script>
  UI.mountChrome('', 'register');
  document.getElementById('regForm').addEventListener('submit', e=>{
    e.preventDefault();
    const u = {
      name: document.getElementById('rName').value.trim(),
      email: document.getElementById('rEmail').value.trim(),
      password: document.getElementById('rPassword').value,
    };
    const res = Store.register(u);
    const alertBox = document.getElementById('regAlert');
    if(!res.ok){
      alertBox.innerHTML = `<div class="alert alert-error">${res.msg}</div>`;
      return;
    }
    Store.login(u.email, u.password);
    location.href = 'index.html';
  });
</script>
</body>
</html>
