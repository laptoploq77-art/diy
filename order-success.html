<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart — Gala Parfume</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div data-nav></div>

<div class="page-head">
  <div class="wrap">
    <h1>Shopping Cart</h1>
    <div class="crumb">Home / Cart</div>
  </div>
</div>

<section class="section">
  <div class="wrap">
    <div id="alertBox"></div>
    <div class="two-col" id="cartLayout"></div>
  </div>
</section>

<div data-footer></div>

<script src="js/store.js"></script>
<script src="js/ui.js"></script>
<script>
  UI.mountChrome('', 'cart');

  const params = new URLSearchParams(location.search);
  if(params.get('added')){
    document.getElementById('alertBox').innerHTML = `
      <div class="alert alert-success"><span>Product added to cart successfully!</span>
      <button onclick="this.parentElement.remove()">&times;</button></div>`;
  }

  function render(){
    const cart = Store.getCart();
    const layout = document.getElementById('cartLayout');

    if(cart.length===0){
      layout.innerHTML = `
        <div class="empty" style="grid-column:1/-1;">
          <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 002 1.6h9.7a2 2 0 002-1.6L23 6H6"/></svg>
          <h3>Your cart is empty</h3>
          <p>Looks like you haven't added anything yet.</p>
          <a href="shop.html" class="btn btn-gold" style="margin-top:10px;">Continue Shopping</a>
        </div>`;
      return;
    }

    const total = Store.cartTotal();
    layout.innerHTML = `
      <div class="panel">
        <h3>Items (${cart.length})</h3>
        <div id="itemsList"></div>
        <button class="btn btn-line btn-sm" id="clearCartBtn" style="margin-top:16px;color:var(--red);border-color:var(--red-bg);">Clear Cart</button>
      </div>
      <div class="panel">
        <h3>Order Summary</h3>
        <div class="summary-row"><span>Items</span><span>${cart.reduce((n,i)=>n+i.qty,0)}</span></div>
        <div class="summary-row total"><span>Total</span><span class="amt">${Store.fmt(total)}</span></div>
        <a href="checkout.html" class="btn btn-gold btn-block" style="margin-top:16px;">Proceed to Checkout</a>
        <a href="shop.html" class="btn btn-dark btn-block" style="margin-top:10px;">Continue Shopping</a>
      </div>
    `;

    document.getElementById('itemsList').innerHTML = cart.map(item => `
      <div class="flex-between" style="padding:16px 0;border-bottom:1px solid var(--line);">
        <div>
          <div style="font-weight:700;">${item.name} ${item.type==='custom' ? '<span class="badge badge-processing" style="margin-left:6px;">Custom</span>' : ''}</div>
          ${item.meta ? `<div class="text-muted" style="font-size:.78rem;margin-top:4px;">${item.meta.notes ? item.meta.notes.join(', ')+' · ' : ''}${item.meta.size||''}</div>` : ''}
          <div class="text-muted" style="font-size:.82rem;margin-top:4px;">${Store.fmt(item.unit_price)} each</div>
        </div>
        <div style="display:flex;align-items:center;gap:14px;">
          <input type="number" min="1" value="${item.qty}" class="qty-input" data-qty="${item.key}">
          <span style="font-weight:800;color:var(--gold-dim);min-width:110px;text-align:right;">${Store.fmt(item.unit_price*item.qty)}</span>
          <button class="btn btn-danger btn-sm" data-remove="${item.key}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0l-1 14a2 2 0 01-2 2H7a2 2 0 01-2-2L4 6h16z"/></svg>
          </button>
        </div>
      </div>
    `).join('');
  }

  document.getElementById('cartLayout').addEventListener('click', e=>{
    const rm = e.target.closest('[data-remove]');
    if(rm){ Store.removeFromCart(rm.dataset.remove); render(); UI.mountChrome('','cart'); }
    const clearBtn = e.target.closest('#clearCartBtn');
    if(clearBtn){ Store.clearCart(); render(); UI.mountChrome('','cart'); }
  });
  document.getElementById('cartLayout').addEventListener('change', e=>{
    const q = e.target.closest('[data-qty]');
    if(q){ Store.updateCartQty(q.dataset.qty, parseInt(q.value||'1',10)); render(); UI.mountChrome('','cart'); }
  });

  render();
</script>
</body>
</html>
