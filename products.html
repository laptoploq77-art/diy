<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders — Gala Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="admin-shell">
  <div data-admin-sidebar></div>
  <main class="admin-main">
    <div class="admin-topbar" data-admin-topbar></div>

    <div class="panel">
      <div class="flex-between">
        <h3 style="border:none;margin:0;padding:0;">Orders Management</h3>
        <div class="chips" id="statusFilters"></div>
      </div>
      <div class="table-wrap">
        <table class="tbl">
          <thead><tr><th>Order #</th><th>Customer</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="../js/store.js"></script>
<script src="js/admin-ui.js"></script>
<script>
  AdminUI.mount('orders', 'Orders', 'All customer orders');

  const statuses = ['All','Pending','Processing','Completed','Cancelled'];
  let active = 'All';

  function renderFilters(){
    document.getElementById('statusFilters').innerHTML = statuses.map(s=>
      `<label class="chip ${s===active?'checked':''}" data-status="${s}">${s}</label>`
    ).join('');
  }
  function render(){
    let orders = Store.getOrders();
    if(active!=='All') orders = orders.filter(o=>o.status===active);
    document.getElementById('rows').innerHTML = orders.map(o=>`
      <tr>
        <td><strong>${o.id}</strong></td>
        <td>${o.customer.name}</td>
        <td>${Store.fmt(o.total)}</td>
        <td><span class="badge badge-${o.status.toLowerCase()}">${o.status}</span></td>
        <td>${new Date(o.date).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'})}</td>
        <td><a href="order-detail.html?id=${o.id}" class="btn btn-line btn-sm">View</a></td>
      </tr>
    `).join('') || `<tr><td colspan="6" class="text-muted" style="text-align:center;padding:30px;">No orders found.</td></tr>`;
  }
  document.getElementById('statusFilters').addEventListener('click', e=>{
    const chip = e.target.closest('[data-status]');
    if(!chip) return;
    active = chip.dataset.status;
    renderFilters(); render();
  });
  renderFilters(); render();
</script>
</body>
</html>
